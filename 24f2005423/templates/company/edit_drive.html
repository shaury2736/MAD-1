{% extends 'base.html' %}
{% block title %}Edit Drive – PlaceIITM{% endblock %}
{% block page_title %}Edit Drive{% endblock %}

{% block content %}
<div style="max-width:680px">
    <div class="data-card">
        <div class="data-card-header">
            <div class="data-card-title"><i class="bi bi-pencil" style="color:var(--accent)"></i> Edit Placement Drive</div>
        </div>
        <div style="padding:32px">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label-custom">Job Title *</label>
                        <input name="job_title" type="text" class="form-control-custom" value="{{ drive.job_title }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Package / CTC</label>
                        <input name="package" type="text" class="form-control-custom" value="{{ drive.package or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Location</label>
                        <input name="location" type="text" class="form-control-custom" value="{{ drive.location or '' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom">Application Deadline</label>
                        <input name="application_deadline" type="date" class="form-control-custom" value="{{ drive.application_deadline or '' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom">Eligibility Criteria</label>
                        <textarea name="eligibility_criteria" class="form-control-custom">{{ drive.eligibility_criteria or '' }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom">Job Description *</label>
                        <textarea name="job_description" class="form-control-custom" style="min-height:150px" required>{{ drive.job_description or '' }}</textarea>
                    </div>
                    <div class="col-12" style="display:flex;gap:12px;margin-top:8px">
                        <button type="submit" class="btn-accent"><i class="bi bi-check-lg"></i> Save Changes</button>
                        <a href="{{ url_for('company_dashboard') }}" class="btn-ghost">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
