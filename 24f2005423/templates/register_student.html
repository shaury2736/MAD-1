{% extends 'base.html' %}
{% block public_content %}
<div class="reg-page">
    <div class="reg-card">
        <div class="reg-header">
            <div class="reg-icon"><i class="bi bi-mortarboard-fill" style="color:var(--accent)"></i></div>
            <div class="reg-title">Student Registration</div>
            <div class="reg-sub">Create your placement portal account</div>
        </div>
        {% for cat, msg in get_flashed_messages(with_categories=True) %}
        <div class="alert-custom alert-{{ cat }}"><i class="bi bi-exclamation-circle"></i> {{ msg }}</div>
        {% endfor %}
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label-custom">Full Name *</label>
                    <input name="name" type="text" class="form-control-custom" placeholder="Arjun Sharma" required>
                </div>
                <div class="form-group">
                    <label class="form-label-custom">Email *</label>
                    <input name="email" type="email" class="form-control-custom" placeholder="arjun@iitm.ac.in" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label-custom">Roll Number *</label>
                    <input name="roll_no" type="text" class="form-control-custom" placeholder="21f1000123" required>
                </div>
                <div class="form-group">
                    <label class="form-label-custom">Phone</label>
                    <input name="phone" type="text" class="form-control-custom" placeholder="+91 9876543210">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label-custom">Branch</label>
                    <select name="branch" class="form-select-custom">
                        <option value="">Select Branch</option>
                        <option>Computer Science</option>
                        <option>Data Science</option>
                        <option>Electrical Engineering</option>
                        <option>Mechanical Engineering</option>
                        <option>Civil Engineering</option>
                        <option>Electronics</option>
                        <option>Management</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label-custom">CGPA</label>
                    <input name="cgpa" type="number" step="0.01" min="0" max="10" class="form-control-custom" placeholder="8.50">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label-custom">Password *</label>
                <input name="password" type="password" class="form-control-custom" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn-accent" style="width:100%;justify-content:center;padding:13px;margin-top:8px">
                <i class="bi bi-person-check"></i> Create Student Account
            </button>
        </form>
        <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary)">
            Already registered? <a href="{{ url_for('login') }}" style="color:var(--accent-light);text-decoration:none">Log in</a>
            &nbsp;|&nbsp; <a href="{{ url_for('index') }}" style="color:var(--text-muted);text-decoration:none">← Home</a>
        </div>
    </div>
</div>
{% endblock %}
